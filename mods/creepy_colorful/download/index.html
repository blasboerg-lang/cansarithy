<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creepy Colorful Mods</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #2a2a35;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1 {
            margin-top: 0;
            color: #4caf50;
            border-bottom: 2px solid #3e3e50;
            padding-bottom: 10px;
        }
        .breadcrumb {
            margin-bottom: 20px;
            font-size: 14px;
            color: #aaa;
        }
        .breadcrumb span {
            color: #4caf50;
            cursor: pointer;
            font-weight: bold;
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #3e3e50;
            transition: background 0.2s;
        }
        .file-item:hover {
            background: #343444;
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon {
            font-size: 18px;
        }
        .folder-link {
            color: #64b5f6;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }
        .folder-link:hover {
            text-decoration: underline;
        }
        .btn-download {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background-color: #45a049;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">creepy_colorful Files</h1>
    <div class="breadcrumb" id="breadcrumb">Directory: <span onclick="loadDirectory('.')">mods/creepy_colorful</span></div>
    
    <div id="loading" class="loading">Scanning Render server directory...</div>
    <ul class="file-list" id="fileList"></ul>
</div>

<script>
    // GitHub API'yi tamamen çöpe attık! 
    // Render sunucusunun kendi klasör yapısını (Server Directory Index) tarıyoruz.
    async function loadDirectory(dirPath) {
        const fileListElement = document.getElementById('fileList');
        const loadingElement = document.getElementById('loading');
        const breadcrumbElement = document.getElementById('breadcrumb');
        
        fileListElement.innerHTML = '';
        loadingElement.style.display = 'block';

        if (dirPath === '.') {
            breadcrumbElement.innerHTML = `Directory: <span>mods/creepy_colorful</span>`;
        } else {
            breadcrumbElement.innerHTML = `Directory: <span onclick="loadDirectory('.')">mods/creepy_colorful</span> / <strong>${dirPath}</strong>`;
        }

        try {
            // Render.com sunucusundaki klasörün ham HTML listesini çekiyoruz
            const response = await fetch(dirPath + '/');
            const htmlText = await response.json().catch(() => response.text());
            loadingElement.style.display = 'none';

            // Eğer Render otomatik directory listing (JSON) veriyorsa direkt işle
            if (typeof htmlText === 'object') {
                processServerData(htmlText, dirPath);
                return;
            }

            // Eğer HTML liste sayfası veriyorsa içindeki linkleri (A taglerini) ayıkla
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const links = Array.from(doc.querySelectorAll('a'));
            
            const detectedItems = [];

            links.forEach(link => {
                const href = link.getAttribute('href');
                const name = link.textContent.replace('/', '').trim();
                
                // Üst dizin linklerini ve gereksizleri eliyoruz
                if (!href || href.startsWith('?') || href.startsWith('/') || name === '..' || name === 'Parent Directory' || !name) {
                    return;
                }

                // Render klasörleri genellikle sonundaki '/' işaretiyle belli eder
                const isDir = href.endsWith('/') || link.textContent.includes('/');
                
                detectedItems.push({
                    name: name,
                    type: isDir ? 'dir' : 'file',
                    path: dirPath === '.' ? name : dirPath + '/' + name
                });
            });

            processServerData(detectedItems, dirPath);

        } catch (error) {
            loadingElement.style.display = 'none';
            fileListElement.innerHTML = `<li class="file-item" style="color: #ff5252;">Error scanning server directory. Please deploy to Render to see live files.</li>`;
            console.error(error);
        }
    }

    function processServerData(items, dirPath) {
        const fileListElement = document.getElementById('fileList');
        
        items.forEach(item => {
            const nameLower = item.name.toLowerCase();
            
            // Ana dizinde index.html ve download klasörünü gizleme kuralı
            if (dirPath === '.') {
                if (nameLower === 'index.html' || nameLower === 'download') {
                    return;
                }
            }

            const li = document.createElement('li');
            li.className = 'file-item';

            if (item.type === 'dir') {
                li.innerHTML = `
                    <div class="file-info">
                        <span class="icon">📁</span>
                        <a class="folder-link" onclick="loadDirectory('${item.path}')">${item.name}</a>
                    </div>
                    <span style="color: #888; font-size: 12px;">Folder</span>
                `;
            } else {
                li.innerHTML = `
                    <div class="file-info">
                        <span class="icon">📄</span>
                        <span>${item.name}</span>
                    </div>
                    <a href="${item.path}" class="btn-download" download>Download</a>
                `;
            }
            fileListElement.appendChild(li);
        });

        if (fileListElement.children.length === 0) {
            fileListElement.innerHTML = '<li class="file-item">No files found.</li>';
        }
    }

    // Başlangıç tetiklemesi
    loadDirectory('.');
</script>

</body>
</html>
