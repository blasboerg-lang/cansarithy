<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creepy Colorful Mods</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #2a2a35;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1 {
            margin-top: 0;
            color: #4caf50;
            border-bottom: 2px solid #3e3e50;
            padding-bottom: 10px;
        }
        .breadcrumb {
            margin-bottom: 20px;
            font-size: 14px;
            color: #aaa;
        }
        .breadcrumb span {
            color: #4caf50;
            cursor: pointer;
            font-weight: bold;
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #3e3e50;
            transition: background 0.2s;
        }
        .file-item:hover {
            background: #343444;
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon {
            font-size: 18px;
        }
        .folder-link {
            color: #64b5f6;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }
        .folder-link:hover {
            text-decoration: underline;
        }
        .btn-download {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">creepy_colorful Files</h1>
    <div class="breadcrumb" id="breadcrumb">Directory: <span onclick="showMain()">mods/creepy_colorful</span></div>
    
    <ul class="file-list" id="fileList"></ul>
</div>

<script>
    const fileList = document.getElementById('fileList');
    const breadcrumb = document.getElementById('breadcrumb');

    // Sayfa ilk açıldığında gösterilecek ana dizin dosyaları
    function showMain() {
        breadcrumb.innerHTML = `Directory: <span>mods/creepy_colorful</span>`;
        fileList.innerHTML = `
            <li class="file-item">
                <div class="file-info"><span class="icon">📁</span><a class="folder-link" onclick="showOldReleases()">old-releases</a></div>
                <span style="color: #888; font-size: 12px;">Folder</span>
            </li>
            <li class="file-item">
                <div class="file-info"><span class="icon">📁</span><a class="folder-link" onclick="showPreview()">preview</a></div>
                <span style="color: #888; font-size: 12px;">Folder</span>
            </li>
            <li class="file-item">
                <div class="file-info"><span class="icon">📄</span><span>README.md</span></div>
                <a href="README.md" class="btn-download" target="_blank">Download</a>
            </li>
            <li class="file-item">
                <div class="file-info"><span class="icon">📄</span><span>creepycolorful-1.1.2-neoforge-1.21.8.jar</span></div>
                <a href="creepycolorful-1.1.2-neoforge-1.21.8.jar" class="btn-download" download>Download</a>
            </li>
        `;
    }

    // old-releases klasörünün içi
    function showOldReleases() {
        breadcrumb.innerHTML = `Directory: <span onclick="showMain()">mods/creepy_colorful</span> / <strong>old-releases</strong>`;
        fileList.innerHTML = `
            <li class="file-item">
                <div class="file-info"><span class="icon">📄</span><span>creepycolorful-1.1.1-neoforge-1.21.8.jar</span></div>
                <a href="old-releases/creepycolorful-1.1.1-neoforge-1.21.8.jar" class="btn-download" download>Download</a>
            </li>
            <li class="file-item">
                <div class="file-info"><span class="icon">📄</span><span>creepycolorful-1.1.0-neoforge-1.21.8.jar</span></div>
                <a href="old-releases/creepycolorful-1.1.0-neoforge-1.21.8.jar" class="btn-download" download>Download</a>
            </li>
        `;
    }

    // preview klasörünün içi
    function showPreview() {
        breadcrumb.innerHTML = `Directory: <span onclick="showMain()">mods/creepy_colorful</span> / <strong>preview</strong>`;
        fileList.innerHTML = `
            <li class="file-item">
                <div class="file-info"><span class="icon">📄</span><span>No preview files visible.</span></div>
            </li>
        `;
    }

    // İlk açılış
    showMain();
</script>

</body>
</html>
