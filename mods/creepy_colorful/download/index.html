<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creepy Colorful Mods</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #2a2a35;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1 {
            margin-top: 0;
            color: #4caf50;
            border-bottom: 2px solid #3e3e50;
            padding-bottom: 10px;
        }
        .breadcrumb {
            margin-bottom: 20px;
            font-size: 14px;
            color: #aaa;
        }
        .breadcrumb span {
            color: #4caf50;
            cursor: pointer;
            font-weight: bold;
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #3e3e50;
            transition: background 0.2s;
        }
        .file-item:hover {
            background: #343444;
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon {
            font-size: 18px;
        }
        .folder-link {
            color: #64b5f6;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }
        .folder-link:hover {
            text-decoration: underline;
        }
        .btn-download {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background-color: #45a049;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-style: italic;
        }
        .error-box {
            background: #442222;
            color: #ff8888;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            border: 1px solid #ff4444;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">creepy_colorful Files</h1>
    <!-- Geri dönüş linki için statik parametre yollandı -->
    <div class="breadcrumb" id="breadcrumb">Directory: <span onclick="loadDirectoryFromGitHub('mods/creepy_colorful')">mods/creepy_colorful</span></div>
    
    <div id="loading" class="loading">Fetching live repository directory from server...</div>
    <ul class="file-list" id="fileList"></ul>
</div>

<script>
    // Kök dizini tam metin olarak tanımlıyoruz
    const rootPath = "mods/creepy_colorful";

    async function loadDirectoryFromGitHub(targetPath) {
        const fileListElement = document.getElementById('fileList');
        const loadingElement = document.getElementById('loading');
        const breadcrumbElement = document.getElementById('breadcrumb');
        
        fileListElement.innerHTML = '';
        loadingElement.style.display = 'block';

        // Navigasyon başlığını dinamik güncelle
        if (targetPath === rootPath) {
            breadcrumbElement.innerHTML = `Directory: <span>mods/creepy_colorful</span>`;
        } else {
            const relativeSub = targetPath.replace(rootPath + '/', '');
            breadcrumbElement.innerHTML = `Directory: <span onclick="loadDirectoryFromGitHub('${rootPath}')">mods/creepy_colorful</span> / <strong>${relativeSub}</strong>`;
        }

        try {
            // URL çakışmalarını önlemek için temiz, tam adres API endpoint'i
            const url = `https://github.com{targetPath}`;
            
            const response = await fetch(url, {
                method: 'GET',
                headers: { 'Accept': 'application/vnd.github.v3+json' }
            });
            
            if (!response.ok) {
                throw new Error(`Server returned status code: ${response.status}`);
            }
            
            // Veriyi alıyoruz (Tamamen dinamik, sunucudan ne gelirse o listelenir)
            const data = await response.json();
            loadingElement.style.display = 'none';

            data.forEach(item => {
                const nameLower = item.name.toLowerCase();
                
                // İSTEDİĞİN FİLTRELER: Ana dizindeysek index.html ve download klasörünü gizle
                if (targetPath === rootPath) {
                    if (nameLower === 'index.html' || nameLower === 'download') {
                        return; 
                    }
                }

                const li = document.createElement('li');
                li.className = 'file-item';

                // Klasör yapısı (old-releases dahil dinamik olarak tıklandığında içeri girer)
                if (item.type === 'dir') {
                    li.innerHTML = `
                        <div class="file-info">
                            <span class="icon">📁</span>
                            <a class="folder-link" onclick="loadDirectoryFromGitHub('${item.path}')">${item.name}</a>
                        </div>
                        <span style="color: #888; font-size: 12px;">Folder</span>
                    `;
                } 
                // Dosyalar ve indirme butonları (Gelecekte ekleyeceğin tüm .jar'lar otomatik buraya gelir)
                else if (item.type === 'file') {
                    li.innerHTML = `
                        <div class="file-info">
                            <span class="icon">📄</span>
                            <span>${item.name}</span>
                        </div>
                        <a href="${item.download_url}" class="btn-download" target="_blank">Download</a>
                    `;
                }

                fileListElement.appendChild(li);
            });

            if (fileListElement.children.length === 0) {
                fileListElement.innerHTML = '<li class="file-item">Directory is empty.</li>';
            }

        } catch (error) {
            loadingElement.style.display = 'none';
            fileListElement.innerHTML = `
                <div class="error-box">
                    <strong>Live Fetch Error:</strong><br>
                    ${error.message}<br><br>
                    <small>Make sure you view this page on your deployed Render URL to bypass local restrictions.</small>
                </div>
            `;
        }
    }

    // İlk tetikleme
    loadDirectoryFromGitHub(rootPath);
</script>

</body>
</html>
