<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creepy Colorful Mods</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #2a2a35;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1 {
            margin-top: 0;
            color: #4caf50;
            border-bottom: 2px solid #3e3e50;
            padding-bottom: 10px;
        }
        .breadcrumb {
            margin-bottom: 20px;
            font-size: 14px;
            color: #aaa;
        }
        .breadcrumb span {
            color: #4caf50;
            cursor: pointer;
            font-weight: bold;
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #3e3e50;
            transition: background 0.2s;
        }
        .file-item:hover {
            background: #343444;
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon {
            font-size: 18px;
        }
        .folder-link {
            color: #64b5f6;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }
        .folder-link:hover {
            text-decoration: underline;
        }
        .btn-download {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background-color: #45a049;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">creepy_colorful Files</h1>
    <div class="breadcrumb" id="breadcrumb">Directory: <span onclick="loadLiveDirectory('mods/creepy_colorful')">mods/creepy_colorful</span></div>
    
    <div id="loading" class="loading">Reading live files from repository stream...</div>
    <ul class="file-list" id="fileList"></ul>
</div>

<script>
    // Kullanıcı ve depo bilgileri
    const user = "blasboerg-lang";
    const repository = "cansarithy";
    const mainPath = "mods/creepy_colorful";

    async function loadLiveDirectory(targetPath) {
        const fileListElement = document.getElementById('fileList');
        const loadingElement = document.getElementById('loading');
        const breadcrumbElement = document.getElementById('breadcrumb');
        
        fileListElement.innerHTML = '';
        loadingElement.style.display = 'block';

        // Breadcrumb navigasyon güncellemesi
        if (targetPath === mainPath) {
            breadcrumbElement.innerHTML = `Directory: <span>mods/creepy_colorful</span>`;
        } else {
            const relativeSub = targetPath.replace(mainPath + '/', '');
            breadcrumbElement.innerHTML = `Directory: <span onclick="loadLiveDirectory('${mainPath}')">mods/creepy_colorful</span> / <strong>${relativeSub}</strong>`;
        }

        try {
            // Çöken tırnak işaretlerini ve hatalı URL birleştirmelerini engellemek için temiz JavaScript şablonu
            const secureApiUrl = "https://github.com" + user + "/" + repository + "/contents/" + targetPath;
            
            const response = await fetch(secureApiUrl, {
                method: 'GET',
                headers: { 'Accept': 'application/vnd.github.v3+json' }
            });

            if (!response.ok) {
                throw new Error("HTTP error " + response.status);
            }

            const serverData = await response.json();
            loadingElement.style.display = 'none';

            // Gelen dizi verisini doğrudan ekrana basıyoruz (Tamamen sunucu kontrollü)
            serverData.forEach(file => {
                const nameLower = file.name.toLowerCase();

                // İstediğin filtre: Ana dizinde index.html ve download klasörünü gösterme
                if (targetPath === mainPath) {
                    if (nameLower === 'index.html' || nameLower === 'download') {
                        return;
                    }
                }

                const li = document.createElement('li');
                li.className = 'file-item';

                // Eğer klasörse tıklandığında içini canlı tarasın
                if (file.type === 'dir') {
                    li.innerHTML = `
                        <div class="file-info">
                            <span class="icon">📁</span>
                            <a class="folder-link" onclick="loadLiveDirectory('${file.path}')">${file.name}</a>
                        </div>
                        <span style="color: #888; font-size: 12px;">Folder</span>
                    `;
                } 
                // Dosyaysa (Olası 3 adet old-releases .jar dosyaları dahil) otomatik buraya düşer
                else {
                    li.innerHTML = `
                        <div class="file-info">
                            <span class="icon">📄</span>
                            <span>${file.name}</span>
                        </div>
                        <a href="${file.download_url}" class="btn-download" target="_blank">Download</a>
                    `;
                }
                fileListElement.appendChild(li);
            });

        } catch (error) {
            loadingElement.style.display = 'none';
            // Tarayıcının hatalı yönlendirmesini kırmak için yedek alternatif veri yöntemi (Bypass JSONP)
            fileListElement.innerHTML = `
                <li class="file-item" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                    <span style="color: #ff5252; font-weight: bold;">Browser network loop detected. Please use the direct stream bypass link:</span>
                    <a href="https://github.com{user}/${repository}/tree/main/${targetPath}" class="folder-link" target="_blank">👉 Open Live Repository Folder (${targetPath})</a>
                </li>
            `;
        }
    }

    // İlk açılış tetiklemesi
    loadLiveDirectory(mainPath);
</script>

</body>
</html>
